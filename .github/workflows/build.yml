name: PlatformIO Cloud Auto-Build Engine

# Triggers the automated compilation matrix every single time you push code modifications to your main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  compile_firmware:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Check out repository tracking catalog code blocks
      uses: actions/checkout@v4

    - name: 🐍 Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Initialize and Cache PlatformIO Core Toolchains
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

    - name: 👽 Install PlatformIO Compiler Engine
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    - name: ⚙️ Execute Production Compilation Run
      run: pio run

    - name: 🚀 Export Completed Binary Packages to Dashboard
      uses: actions/upload-artifact@v4
      with:
        name: LeakDetector_Firmware_v2.0.0
        path: .pio/build/esp32c3_ota/firmware.bin
        if-no-files-found: error
